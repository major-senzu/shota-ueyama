<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #ffffff;
    --fg: #0a0a0a;
    --muted: #888;
    --line: #e5e5e5;
    --soft: #f7f7f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; padding: 32px 48px 48px; overflow-x: hidden; }
  .wrap { max-width: 1240px; margin: 0 auto; }

  .crumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 32px;
    letter-spacing: 0.04em;
  }
  .crumb a { color: var(--muted); text-decoration: none; }
  .crumb a:hover { color: var(--fg); border-bottom: 1px solid var(--muted); }
  .crumb .sep { margin: 0 8px; }

  .hero { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--line); }
  .hero h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
  .hero .ja { font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; }

  /* page-switcher */
  .page-switch {
    display: flex; gap: 0;
    margin-bottom: 32px;
    border: 1px solid var(--line);
    width: fit-content;
  }
  .page-switch a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #555;
    text-decoration: none;
    padding: 11px 24px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.15s;
    background: #fff;
  }
  .page-switch a + a { border-left: 1px solid var(--line); }
  .page-switch a:hover { background: #fafafa; color: var(--fg); }
  .page-switch a.active { background: var(--fg); color: #fff; }

  /* toolbar */
  .toolbar {
    display: flex;
    gap: 14px;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .toolbar input, .toolbar select {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 12px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--fg);
    outline: none;
    border-radius: 0;
    transition: border-color 0.15s;
  }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--fg); }
  .toolbar input { width: 240px; }
  .toolbar .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
    letter-spacing: 0.04em;
  }

  /* table */
  .table-wrap {
    border: 1px solid var(--line);
    overflow-x: auto;
    background: #fff;
  }
  table.books {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.books thead th {
    background: var(--soft);
    color: var(--fg);
    font-weight: 600;
    text-align: left;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    user-select: none;
    position: relative;
  }
  table.books thead th:hover { background: #efefef; }
  table.books thead th .arrow {
    display: inline-block;
    margin-left: 4px;
    color: var(--muted);
    font-size: 9px;
  }
  table.books thead th.sorted .arrow { color: var(--fg); }

  table.books tbody td {
    padding: 14px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  table.books tbody tr:last-child td { border-bottom: none; }
  table.books tbody tr:hover { background: #fafafa; }

  td.col-num {
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    font-size: 11px;
    width: 36px;
  }
  td.col-title .title { font-weight: 600; line-height: 1.4; }
  td.col-title .title-en {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }
  td.col-author { color: #444; }
  td.col-cat .badge {
    display: inline-block;
    padding: 3px 9px;
    background: #f0f0f0;
    color: #444;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    border-radius: 2px;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  td.col-status .status-pill {
    display: inline-block;
    padding: 3px 9px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    border: 1px solid var(--line);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fg);
  }
  td.col-status .status-pill.read    { background: #f5f5f5; }
  td.col-status .status-pill.reading { background: #fffbe6; border-color: #f1d97a; }
  td.col-status .status-pill.want    { background: #fff; color: var(--muted); }
  td.col-date {
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    font-size: 11px;
    white-space: nowrap;
  }
  td.col-rating { color: #d4a017; font-size: 12px; letter-spacing: 0.04em; white-space: nowrap; }
  td.col-amazon a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  td.col-amazon a:hover { color: var(--fg); }
  td.col-amazon .arrow { display: inline-block; margin-left: 3px; transition: transform 0.15s; }
  td.col-amazon a:hover .arrow { transform: translateX(2px); }

  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  @media (max-width: 760px) {
    body { padding: 24px 16px 32px; }

    .toolbar input { width: 100%; }
    table.books { font-size: 12px; }

  <script>
    (function () {
      const STATUS_LABEL = { read: '読了', reading: '読書中', want: '積読' };
      const STATUS_ORDER = { read: 1, reading: 2, want: 3 };

      const catMap = Object.fromEntries((window.BOOK_CATEGORIES || []).map(c => [c.id, c.name]));

      // augment data
      const data = (window.BOOKS || []).map((b, i) => ({
        ...b,
        _idx: i + 1,
        categoryName: catMap[b.category] || b.category || '—',
      }));

      // populate category filter
      const catFilter = document.getElementById('cat-filter');
      (window.BOOK_CATEGORIES || []).forEach(c => {
        const o = document.createElement('option');
        o.value = c.id;
        o.textContent = c.name;
        catFilter.appendChild(o);
      });

      // state
      let sortKey = '_idx';
      let sortDir = 1; // 1 asc, -1 desc
      let q = '';
      let catSel = '';
      let statusSel = '';

      const tbody = document.getElementById('tbody');
      const countEl = document.getElementById('count');
      const ths = document.querySelectorAll('thead th');

      const renderRating = (r) => {
        if (r == null) return '<span style="color:#ccc">—</span>';
        return '★'.repeat(r) + '<span style="color:#e5e5e5">' + '★'.repeat(5 - r) + '</span>';
      };

      const renderRow = (b) => `
        <tr>
          <td class="col-num">${b._idx}</td>
          <td class="col-title">
            <div class="title">${b.title || ''}</div>
            ${b.titleEn ? `<div class="title-en">${b.titleEn}</div>` : ''}
          </td>
          <td class="col-author">${b.author || ''}</td>
          <td class="col-cat"><span class="badge">${b.categoryName}</span></td>
          <td class="col-status"><span class="status-pill ${b.status || ''}">${STATUS_LABEL[b.status] || '—'}</span></td>
          <td class="col-date">${b.readDate || '—'}</td>
          <td class="col-rating">${renderRating(b.rating)}</td>
          <td class="col-amazon">${b.amazon ? `<a href="${b.amazon}" target="_blank" rel="noopener">Amazon <span class="arrow">→</span></a>` : '—'}</td>
        </tr>
      `;

      const compare = (a, b) => {
        let av = a[sortKey];
        let bv = b[sortKey];
        if (sortKey === 'status') {
          av = STATUS_ORDER[av] || 99;
          bv = STATUS_ORDER[bv] || 99;
        }
        // null/undefined sort to bottom regardless of direction
        const an = av == null || av === '';
        const bn = bv == null || bv === '';
        if (an && bn) return 0;
        if (an) return 1;
        if (bn) return -1;
        if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * sortDir;
        return String(av).localeCompare(String(bv), 'ja') * sortDir;
      };

      const matchFilter = (b) => {
        if (catSel && b.category !== catSel) return false;
        if (statusSel && b.status !== statusSel) return false;
        if (q) {
          const hay = [b.title, b.titleEn, b.author, b.categoryName].join(' ').toLowerCase();
          if (!hay.includes(q.toLowerCase())) return false;
        }
        return true;
      };

      const render = () => {
        const rows = data.filter(matchFilter).slice().sort(compare);
        tbody.innerHTML = rows.length
          ? rows.map(renderRow).join('')
          : `<tr><td colspan="8" class="empty">該当なし</td></tr>`;
        countEl.textContent = `${rows.length} / ${data.length} 冊`;

        ths.forEach(th => {
          th.classList.toggle('sorted', th.dataset.key === sortKey);
          let arrow = th.querySelector('.arrow');
          if (!arrow) {
            arrow = document.createElement('span');
            arrow.className = 'arrow';
            th.appendChild(arrow);
          }
          if (th.dataset.key === sortKey) {
            arrow.textContent = sortDir === 1 ? '▲' : '▼';
          } else {
            arrow.textContent = '↕';
          }
        });
      };

      ths.forEach(th => {
        const key = th.dataset.key;
        if (!key || key === '_amazon') return;
        th.addEventListener('click', () => {
          if (sortKey === key) sortDir *= -1;
          else { sortKey = key; sortDir = 1; }
          render();
        });
      });

      document.getElementById('q').addEventListener('input', e => { q = e.target.value; render(); });
      catFilter.addEventListener('change', e => { catSel = e.target.value; render(); });
      document.getElementById('status-filter').addEventListener('change', e => { statusSel = e.target.value; render(); });

      render();
    })();
  </script>
