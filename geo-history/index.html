  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #ffffff;
    --fg: #0a0a0a;
    --muted: #888;
    --muted-2: #b8b8b8;
    --line: #e5e5e5;
    --soft: #f7f7f7;
    --hero-bg: #0a0a0a;
    --hero-fg: #ffffff;
    --hero-muted: #999;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    padding: 0;
  }

  /* ==================================== */
  /* HERO (黒背景)                          */
  /* ==================================== */
  .hero {
    background: var(--hero-bg);
    color: var(--hero-fg);
    padding: 56px 0 64px;
  }

  .hero-inner {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 48px;
  }

  .hero .doc-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--hero-muted);
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  .hero h1 {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -0.025em;
    line-height: 1.0;
  }

  /* ==================================== */
  /* WRAP                                  */
  /* ==================================== */
  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 56px 48px 80px;
  }

  /* ==================================== */
  /* COUNTRY LIST                          */
  /* ==================================== */
  .country-list {
    list-style: none;
  }

  .country {
    margin-bottom: 56px;
  }

  .country:last-child {
    margin-bottom: 0;
  }

  .country .country-link {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: var(--fg);
    margin-bottom: 14px;
    transition: opacity 0.15s;
  }

  .country .country-link:hover {
    opacity: 0.6;
  }

  .country .flag {
    font-size: 26px;
    line-height: 1;
  }

  .country .country-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .city-list {
    list-style: none;
    border-top: 1px solid var(--line);
    margin-left: 0;
  }

  .city-list li {
    border-bottom: 1px solid var(--line);
  }

  .city-list a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 4px 16px 18px;
    text-decoration: none;
    color: var(--muted-2);
    font-size: 15px;
    transition: color 0.15s, background 0.15s;
  }

  .city-list a:hover {
    color: var(--fg);
    background: var(--soft);
  }

  .city-list a::before {
    content: '•';
    color: var(--muted-2);
    margin-right: 4px;
  }

  /* ==================================== */
  /* RESPONSIVE                            */
  /* ==================================== */
  @media (max-width: 600px) {
    .hero-inner { padding: 0 22px; }
    .wrap { padding: 36px 22px 56px; }
    .hero { padding: 40px 0 48px; }
    .hero h1 { font-size: 36px; }
    .country .country-name { font-size: 18px; }
    .country .flag { font-size: 22px; }
  }
</style>
