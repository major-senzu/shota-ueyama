  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #ffffff;
    --fg: #0a0a0a;
    --muted: #888;
    --line: #e5e5e5;
    --soft: #f7f7f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; padding: 32px 48px 48px; overflow-x: hidden; }
  .wrap { max-width: 1100px; margin: 0 auto; }

  .crumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 32px;
    letter-spacing: 0.04em;
  }
  .crumb a { color: var(--muted); text-decoration: none; }
  .crumb a:hover { color: var(--fg); border-bottom: 1px solid var(--muted); }
  .crumb .sep { margin: 0 8px; }

  .hero { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--line); }
  .hero h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
  .hero .ja { font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; }

  /* page-switcher (Top page / All list) */
  .page-switch {
    display: flex; gap: 0;
    margin-bottom: 48px;
    border: 1px solid var(--line);
    width: fit-content;
  }
  .page-switch a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #555;
    text-decoration: none;
    padding: 11px 24px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.15s;
    background: #fff;
  }
  .page-switch a + a { border-left: 1px solid var(--line); }
  .page-switch a:hover { background: #fafafa; color: var(--fg); }
  .page-switch a.active { background: var(--fg); color: #fff; }

  /* book section */
  .book-section { margin-bottom: 64px; }

  .section-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: baseline;
    gap: 14px;
    font-weight: 500;
  }
  .section-head .label-jp {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--fg);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 600;
  }

  /* book row */
  .book-row {
    display: grid;
    grid-template-columns: 48px 1fr auto;
    align-items: center;
    gap: 24px;
    padding: 22px 0;
    border-bottom: 1px solid var(--line);
  }
  .book-row .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .book-row .info .title {
    font-size: 17px;
    font-weight: 700;
    color: var(--fg);
    margin-bottom: 4px;
    letter-spacing: -0.005em;
  }
  .book-row .info .meta {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
  }
  .book-row .info .meta .sep { margin: 0 8px; opacity: 0.6; }
  .book-row .amazon {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.15s;
    white-space: nowrap;
  }
  .book-row .amazon:hover { color: var(--fg); }
  .book-row .amazon .arrow { display: inline-block; margin-left: 4px; transition: transform 0.15s; }
  .book-row .amazon:hover .arrow { transform: translateX(3px); }

  .empty-row {
    padding: 22px 0;
    color: var(--muted);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid var(--line);
  }

  @media (max-width: 760px) {
    body { padding: 24px 20px 32px; }
    .hero h1 { font-size: 26px; }
    .book-row { grid-template-columns: 32px 1fr; gap: 14px; padding: 16px 0; }
    .book-row .info .title { font-size: 15px; }
    .book-row .amazon { grid-column: 2; padding-left: 0; font-size: 11px; }
  }

  <script>
    (function () {
      const pad = (n) => String(n).padStart(2, '0');

      const renderRow = (rank, book) => {
        const author = book.author || '';
        const titleEn = book.titleEn || '';
        const sep = author && titleEn ? ' <span class="sep">·</span> ' : '';
        const amazon = book.amazon || '#';
        return `
          <div class="book-row">
            <div class="num">${pad(rank)}</div>
            <div class="info">
              <div class="title">${book.title}</div>
              <div class="meta">${author}${sep}${titleEn}</div>
            </div>
            <a class="amazon" href="${amazon}" target="_blank" rel="noopener">Amazon <span class="arrow">→</span></a>
          </div>
        `;
      };

      const renderEmpty = () => `<div class="empty-row">— まだありません</div>`;

      // TOP 5
      const top5Container = document.getElementById('top5-list');
      const byId = Object.fromEntries(window.BOOKS.map(b => [b.id, b]));
      const top5 = (window.BOOK_TOP5 || []).map(id => byId[id]).filter(Boolean);
      top5Container.innerHTML = top5.length
        ? top5.map((b, i) => renderRow(i + 1, b)).join('')
        : renderEmpty();

      // ジャンル別 TOP 3
      const genreContainer = document.getElementById('genre-sections');
      const sections = (window.BOOK_CATEGORIES || []).map(cat => {
        const books = window.BOOKS
          .filter(b => b.category === cat.id && b.genreTop)
          .slice(0, 3);
        const rows = books.length
          ? books.map((b, i) => renderRow(i + 1, b)).join('')
          : renderEmpty();
        return `
          <section class="book-section">
            <h2 class="section-head">
              <span>${cat.id.toUpperCase()}</span>
              <span class="label-jp">${cat.name}</span>
            </h2>
            ${rows}
          </section>
        `;
      });
      genreContainer.innerHTML = sections.join('');
    })();
  </script>
